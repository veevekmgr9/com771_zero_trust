<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Zero Trust Healthcare</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            margin: 0;
            padding: 0;
        }

        .navbar {
            background: #1e3a8a;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            background: #dc2626;
            padding: 8px 14px;
            border-radius: 6px;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }

        .card {
            background: #eff6ff;
            padding: 20px;
            border-radius: 10px;
            border-left: 5px solid #2563eb;
        }

        .card h4 {
            margin: 0 0 10px;
        }

        .note {
            margin-top: 30px;
            padding: 15px;
            background: #fef3c7;
            border-radius: 8px;
            color: #92400e;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <div><strong>Zero Trust Healthcare System</strong></div>
        <div><a href="{{ url_for('logout') }}">Logout</a></div>
    </div>

    <div class="container">
        <h2>Welcome, {{ username }}</h2>

        <div class="info-grid">
            <div class="card">
                <h4>Role</h4>
                <p>{{ role }}</p>
            </div>

            <div class="card">
                <h4>Device ID</h4>
                <p>{{ device_id }}</p>
            </div>

            <div class="card">
                <h4>MFA Status</h4>
                <p>
                    {% if mfa_verified %}
                    Verified
                    {% else %}
                    Not Verified Yet
                    {% endif %}
                </p>
            </div>
        </div>

    </div>
</body>

</html>
